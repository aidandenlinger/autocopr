version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    # Put all actions updates in a single PR
    groups:
      github-actions:
        patterns:
          - '*'
    cooldown:
      default-days: 7

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    # Bundle all Python updates in a single PR
    groups:
      # Dependabot doesn't support separating uv deps into development/production
      deps:
        patterns:
          - '*'
    cooldown:
      default-days: 7
